url: http://localhost:8080
---
- launchApp
- extendedWaitUntil:
    visible: "diary-screen"
    timeout: 60000
- tapOn:
    id: "maestro-open-profile"
- extendedWaitUntil:
    visible: "profile-screen"
    timeout: 15000
- assertVisible: "profile-screen"
- tapOn:
    id: "maestro-scan-back"
- extendedWaitUntil:
    visible: "diary-screen"
    timeout: 15000
- assertVisible: "diary-screen"
