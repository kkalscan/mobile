url: https://kkalscan.github.io/mobile/?fake=1
---
- launchApp
- extendedWaitUntil:
    visible:
      id: "maestro-hook"
    timeout: 240000
- extendedWaitUntil:
    visible: "diary-fab-main-count-1"
    timeout: 240000
- assertVisible: "diary-fab-collapsed"
- assertVisible: "diary-fab-actions-0"
- assertVisible: "diary-fab-main-count-1"
- tapOn:
    id: "maestro-tap-main-fab"
- extendedWaitUntil:
    visible: "diary-fab-expanded"
    timeout: 10000
- assertVisible: "diary-fab-actions-3"
- assertVisible: "diary-fab-main-count-1"
- tapOn:
    id: "maestro-tap-main-fab"
- extendedWaitUntil:
    visible: "diary-fab-collapsed"
    timeout: 10000
- assertVisible: "diary-fab-actions-0"
- assertVisible: "diary-fab-main-count-1"
