name: Web Maestro

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  fab-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build WASM bundle
        run: |
          chmod +x gradlew
          ./gradlew :composeApp:wasmJsBrowserDevelopmentWebpack --no-daemon

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Run diary FAB Maestro flow
        run: |
          WASM_DIR="composeApp/build/kotlin-webpack/wasmJs/developmentExecutable"
          SERVE_DIR="composeApp/build/wasm-serve"
          mkdir -p "$SERVE_DIR"
          cp -R "$WASM_DIR"/. "$SERVE_DIR"/
          cp composeApp/src/wasmJsMain/resources/index.html "$SERVE_DIR"/
          cp composeApp/src/wasmJsMain/resources/*.png "$SERVE_DIR"/ 2>/dev/null || true
          cp composeApp/src/wasmJsMain/resources/*.svg "$SERVE_DIR"/ 2>/dev/null || true
          cp composeApp/src/wasmJsMain/resources/*.webmanifest "$SERVE_DIR"/ 2>/dev/null || true
          python3 -m http.server 8080 --directory "$SERVE_DIR" &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          sleep 2
          maestro test -p web --headless --screen-size 390x844 maestro/web-diary-fab.yaml
