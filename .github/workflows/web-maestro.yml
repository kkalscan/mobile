name: Web Maestro (PR)

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  fab-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build static WASM site
        run: |
          chmod +x gradlew scripts/prepare-wasm-site.sh
          ./scripts/prepare-wasm-site.sh

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Run diary FAB Maestro flow (local artifact)
        run: |
          node scripts/serve-wasm-http.mjs 8080 composeApp/build/web-pages-site &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8080/ >/dev/null && break
            sleep 2
          done
          maestro test -p web --headless --screen-size 390x844 \
            maestro/web-diary-fab-local.yaml \
            maestro/web-diary-fab-scan-local.yaml
