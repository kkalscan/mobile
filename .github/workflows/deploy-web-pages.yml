name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build static WASM site
        run: |
          chmod +x gradlew scripts/prepare-wasm-site.sh
          PAGES_DEPLOY=1 ./scripts/prepare-wasm-site.sh

      - uses: actions/upload-pages-artifact@v3
        with:
          path: composeApp/build/web-pages-site

      - id: deployment
        uses: actions/deploy-pages@v4

  verify-web:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium

      - name: Wait for GitHub Pages
        run: |
          URL="https://kkalscan.github.io/mobile/?fake=1"
          for i in $(seq 1 30); do
            if curl -sf "$URL" >/dev/null; then
              echo "Pages live: $URL"
              exit 0
            fi
            echo "Waiting for Pages ($i/30)..."
            sleep 10
          done
          echo "Pages did not become available in time"
          exit 1

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Run Maestro against GitHub Pages
        env:
          WEB_BASE_URL: https://kkalscan.github.io/mobile/?fake=1
        run: |
          maestro test -p web --headless --screen-size 390x844 \
            maestro/web-diary-fab.yaml \
            maestro/web-diary-fab-scan.yaml

      - name: Capture FAB screenshot from Pages
        env:
          WEB_BASE_URL: https://kkalscan.github.io/mobile/?fake=1
          FAB_SCREENSHOT: fab-expanded-pages.png
        run: python3 scripts/verify-web-pages-fab.py

      - uses: actions/upload-artifact@v4
        with:
          name: web-fab-screenshot
          path: fab-expanded-pages.png
