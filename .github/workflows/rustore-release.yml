name: RuStore Release

on:
  release:
    types: [published]
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name (e.g. 0.2.0). Empty = from tag or run number"
        required: false
        type: string
      whats_new:
        description: "Release notes for RuStore"
        required: false
        type: string
      version_code:
        description: "Android versionCode. Empty = derived from version name"
        required: false
        type: string

concurrency:
  group: rustore-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          INPUT_NAME="${{ github.event.inputs.version_name }}"
          INPUT_CODE="${{ github.event.inputs.version_code }}"
          if [ -n "$INPUT_NAME" ]; then
            NAME="$INPUT_NAME"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            NAME="${GITHUB_REF#refs/tags/}"
            NAME="${NAME#v}"
          elif [ -n "${{ github.event.release.tag_name }}" ]; then
            NAME="${{ github.event.release.tag_name }}"
            NAME="${NAME#v}"
          else
            NAME="0.1.${{ github.run_number }}"
          fi
          if [ -n "$INPUT_CODE" ]; then
            if ! [[ "$INPUT_CODE" =~ ^[0-9]+$ ]]; then
              echo "version_code must be a positive integer"
              exit 1
            fi
            CODE="$INPUT_CODE"
          elif [[ "$NAME" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            CODE=$((10#${BASH_REMATCH[1]} * 10000 + 10#${BASH_REMATCH[2]} * 100 + 10#${BASH_REMATCH[3]}))
          else
            CODE=$((100000 + ${{ github.run_number }}))
          fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "Version: $NAME ($CODE)"

      - name: Resolve release notes
        id: notes
        run: |
          set -euo pipefail
          INPUT="${{ github.event.inputs.whats_new }}"
          if [ -n "$INPUT" ]; then
            NOTES="$INPUT"
          elif [ -n "${{ github.event.release.body }}" ]; then
            NOTES="${{ github.event.release.body }}"
          else
            NOTES="KkalScan ${{ steps.version.outputs.name }} — обновление приложения."
          fi
          {
            echo "text<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install RuStore publish deps
        run: pip install -r scripts/requirements-rustore.txt

      - name: Prepare Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "Missing secret ANDROID_KEYSTORE_BASE64"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      - name: Build signed AAB
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew :composeApp:bundleRelease --no-daemon \
            -PVERSION_NAME="${{ steps.version.outputs.name }}" \
            -PVERSION_CODE="${{ steps.version.outputs.code }}"
          AAB=$(find composeApp/build/outputs/bundle/release -name '*.aab' | head -1)
          if [ -z "$AAB" ]; then
            echo "AAB not found"
            exit 1
          fi
          echo "AAB_PATH=$AAB" >> "$GITHUB_ENV"
          ls -lh "$AAB"

      - name: Publish to RuStore
        env:
          RUSTORE_KEY_ID: ${{ secrets.RUSTORE_KEY_ID }}
          RUSTORE_PRIVATE_KEY: ${{ secrets.RUSTORE_PRIVATE_KEY }}
          RUSTORE_PACKAGE_NAME: ru.kkalscan.app
          RUSTORE_WHATS_NEW: ${{ steps.notes.outputs.text }}
          RUSTORE_PUBLISH_TYPE: INSTANTLY
        run: |
          set -euo pipefail
          missing=()
          [ -z "${RUSTORE_KEY_ID:-}" ] && missing+=("RUSTORE_KEY_ID")
          [ -z "${RUSTORE_PRIVATE_KEY:-}" ] && missing+=("RUSTORE_PRIVATE_KEY")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing secrets: ${missing[*]}"
            exit 1
          fi
          python3 scripts/rustore_publish.py

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: kkalscan-release-aab
          path: ${{ env.AAB_PATH }}
          if-no-files-found: error
