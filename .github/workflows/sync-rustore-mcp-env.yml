name: Sync RuStore MCP env

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Push RuStore credentials to VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          RUSTORE_KEY_ID: ${{ secrets.RUSTORE_KEY_ID }}
          RUSTORE_PRIVATE_KEY: ${{ secrets.RUSTORE_PRIVATE_KEY }}
        with:
          host: 91.207.75.72
          username: root
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          envs: RUSTORE_KEY_ID,RUSTORE_PRIVATE_KEY
          script: |
            set -euo pipefail
            cat > /opt/rustore-mcp/.env <<EOF
            RUSTORE_KEY_ID=${RUSTORE_KEY_ID}
            RUSTORE_PRIVATE_KEY=${RUSTORE_PRIVATE_KEY}
            RUSTORE_PACKAGE_NAME=ru.kkalscan.app
            RUSTORE_API_BASE=https://public-api.rustore.ru
            EOF
            chmod 600 /opt/rustore-mcp/.env
            cd /opt/rustore-mcp && docker compose restart
            curl -sf http://127.0.0.1:3013/health
