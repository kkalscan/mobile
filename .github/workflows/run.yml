name: Run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Test and build debug APK
        run: |
          chmod +x gradlew
          ./gradlew :shared:jvmTest :composeApp:assembleDebug :composeApp:compileDebugAndroidTestKotlinAndroid --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: run
          path: composeApp/build/outputs/apk/debug/*.apk
          retention-days: 7
