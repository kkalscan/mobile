<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#F4F7FB">
    <meta name="apple-mobile-web-app-title" content="KkalScan">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="icon" href="favicon-32.png" sizes="32x32" type="image/png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="manifest" href="manifest.webmanifest">
    <title>KkalScan</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #dbe3ec;
            overflow: hidden;
        }
        canvas#ComposeTarget {
            width: 100%;
            height: 100%;
            display: block;
        }
        #maestro-scan-state {
            position: fixed;
            left: 8px;
            top: 120px;
            width: 280px;
            height: 24px;
            opacity: 0.01;
            z-index: 10;
        }
        #maestro-hook {
            position: fixed;
            left: 8px;
            top: 8px;
            width: 140px;
            height: 24px;
            opacity: 0.01;
            z-index: 10;
        }
        #maestro-fab-hook, #maestro-fab-actions-hook, #maestro-fab-main-hook {
            position: fixed;
            left: 8px;
            top: 36px;
            width: 200px;
            height: 24px;
            opacity: 0.01;
            z-index: 10;
        }
        #maestro-fab-actions-hook { top: 64px; }
        #maestro-fab-main-hook { top: 92px; }
        #maestro-open-scan, #maestro-open-profile, #maestro-open-journal, #maestro-scan-back, #maestro-stub-scan, #maestro-confirm-add, #maestro-grams-plus, #maestro-grams-minus, #maestro-portion-half, #maestro-portion-double, #maestro-open-food-search, #maestro-open-describe-food, #maestro-describe-food-demo, #maestro-food-search-demo, #maestro-food-search-add, #maestro-deeplink-profile, #maestro-deeplink-journal, #maestro-deeplink-diary, #maestro-feature-search-first {
            position: fixed;
            opacity: 0.01;
            z-index: 10;
        }
        #maestro-tap-main-fab, #maestro-tap-fab-scan, #maestro-fab-scan-photo {
            position: fixed;
            z-index: 12;
            opacity: 0.15;
            background: transparent;
            border: 0;
            color: transparent;
            padding: 0;
        }
        #maestro-open-scan { right: 20px; bottom: 130px; width: 56px; height: 56px; }
        #maestro-tap-main-fab { right: 20px; left: auto; bottom: 130px; width: 56px; height: 56px; }
        #maestro-tap-fab-scan, #maestro-fab-scan-photo { pointer-events: none; opacity: 0; z-index: 12; }
        #maestro-open-describe-food { left: 16px; bottom: 130px; width: 56px; height: 56px; }
        #maestro-stub-scan { right: 20px; bottom: 150px; width: 56px; height: 56px; }
        #maestro-grams-plus { right: 80px; bottom: 150px; width: 40px; height: 40px; }
        #maestro-grams-minus { right: 130px; bottom: 150px; width: 40px; height: 40px; }
        #maestro-portion-half { right: 180px; bottom: 150px; width: 40px; height: 40px; }
        #maestro-portion-double { right: 230px; bottom: 150px; width: 40px; height: 40px; }
        #maestro-confirm-add { left: 50%; bottom: 160px; width: 200px; height: 48px; transform: translateX(-50%); }
        #maestro-open-profile { left: 20px; bottom: 24px; width: 80px; height: 48px; }
        #maestro-open-journal { left: 110px; bottom: 24px; width: 80px; height: 48px; }
        #maestro-scan-back { left: 50%; bottom: 90px; width: 120px; height: 40px; transform: translateX(-50%); }
        #maestro-open-food-search { left: 50%; top: 280px; width: 200px; height: 48px; transform: translateX(-50%); }
        #maestro-describe-food-demo { left: 50%; top: 460px; width: 200px; height: 48px; transform: translateX(-50%); }
        #maestro-food-search-demo { left: 50%; top: 340px; width: 200px; height: 48px; transform: translateX(-50%); }
        #maestro-feature-search-first { left: 50%; top: 520px; width: 200px; height: 48px; transform: translateX(-50%); }
        #maestro-deeplink-profile { left: 8px; top: 40px; width: 80px; height: 32px; }
        #maestro-deeplink-journal { left: 96px; top: 40px; width: 80px; height: 32px; }
        #maestro-deeplink-diary { left: 184px; top: 40px; width: 80px; height: 32px; }
    </style>
</head>
<body>
<div id="maestro-scan-state" role="status" aria-live="polite"></div>
<div id="maestro-hook" role="status" aria-live="polite">app-loading</div>
<div id="maestro-fab-hook" role="status" aria-live="polite">diary-fab-collapsed</div>
<div id="maestro-fab-actions-hook" role="status" aria-live="polite">diary-fab-actions-0</div>
<div id="maestro-fab-main-hook" role="status" aria-live="polite">diary-fab-main-count-0</div>
<button id="maestro-tap-main-fab" type="button" aria-label="tap-main-fab">main-fab</button>
<button id="maestro-tap-fab-scan" type="button" aria-label="tap-fab-scan">fab-scan</button>
<input type="file" id="wasm-photo-input" accept="image/*" hidden>
<label id="maestro-fab-scan-photo" for="wasm-photo-input" aria-label="scan-photo">scan-photo</label>
<button id="maestro-open-scan" type="button" aria-label="open-scan-picker">scan</button>
<button id="maestro-stub-scan" type="button" aria-label="stub-scan">stub-scan</button>
<button id="maestro-grams-plus" type="button" aria-label="grams-plus">grams-plus</button>
<button id="maestro-grams-minus" type="button" aria-label="grams-minus">grams-minus</button>
<button id="maestro-portion-half" type="button" aria-label="portion-half">portion-half</button>
<button id="maestro-portion-double" type="button" aria-label="portion-double">portion-double</button>
<button id="maestro-confirm-add" type="button" aria-label="confirm-add-to-diary">confirm-add</button>
<button id="maestro-open-profile" type="button" aria-label="open-profile-screen">profile</button>
<button id="maestro-open-journal" type="button" aria-label="open-journal-screen">journal</button>
<button id="maestro-scan-back" type="button" aria-label="scan-back">back</button>
<button id="maestro-open-food-search" type="button" aria-label="open-food-search">food-search</button>
<button id="maestro-open-describe-food" type="button" aria-label="open-describe-food">describe-food</button>
<button id="maestro-describe-food-demo" type="button" aria-label="describe-food-demo">describe-demo</button>
<button id="maestro-food-search-demo" type="button" aria-label="food-search-demo">food-search-demo</button>
<button id="maestro-food-search-add" type="button" aria-label="food-search-add">food-search-add</button>
<button id="maestro-feature-search-first" type="button" aria-label="feature-search-first">feature-search-first</button>
<button id="maestro-deeplink-profile" type="button" aria-label="deeplink-profile">deeplink-profile</button>
<button id="maestro-deeplink-journal" type="button" aria-label="deeplink-journal">deeplink-journal</button>
<button id="maestro-deeplink-diary" type="button" aria-label="deeplink-diary">deeplink-diary</button>
<canvas id="ComposeTarget"></canvas>
<script src="kkalscan.js"></script>
<script>
    // Webpack WASM bundle is async; dev server injects this, static serve needs it explicitly.
    globalThis.composeApp.then((module) => module.main());
</script>
</body>
</html>
