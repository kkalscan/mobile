<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#F4F7FB">
    <title>KkalScan</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #dbe3ec;
            overflow: hidden;
        }
        canvas#ComposeTarget {
            width: 100%;
            height: 100%;
            display: block;
        }
        #maestro-hook {
            position: fixed;
            left: 8px;
            top: 8px;
            width: 140px;
            height: 24px;
            opacity: 0.01;
            z-index: 10;
        }
        #maestro-open-scan, #maestro-open-profile, #maestro-scan-back {
            position: fixed;
            opacity: 0.01;
            z-index: 10;
        }
        #maestro-open-scan { right: 20px; bottom: 90px; width: 56px; height: 56px; }
        #maestro-open-profile { left: 20px; bottom: 24px; width: 120px; height: 48px; }
        #maestro-scan-back { left: 50%; bottom: 90px; width: 120px; height: 40px; transform: translateX(-50%); }
    </style>
</head>
<body>
<div id="maestro-hook" role="status" aria-live="polite">app-loading</div>
<button id="maestro-open-scan" type="button" aria-label="open-scan-picker">scan</button>
<button id="maestro-open-profile" type="button" aria-label="open-profile-screen">profile</button>
<button id="maestro-scan-back" type="button" aria-label="scan-back">back</button>
<canvas id="ComposeTarget"></canvas>
<script src="kkalscan.js"></script>
</body>
</html>
